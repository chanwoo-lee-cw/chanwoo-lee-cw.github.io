<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기술블로그 | 이찬우</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="blog.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
<header class="blog-header">
  <div class="header-inner">
    <a href="index.html" class="logo">이찬우<span>.</span> 기술블로그</a>
    <a href="index.html" class="back-link">← 목록으로</a>
  </div>
</header>

<main class="blog-container">
  <article class="post-detail" id="post-detail">
    <p class="blog-error">불러오는 중...</p>
  </article>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/http.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/dockerfile.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.2/dist/svg-pan-zoom.min.js"></script>
<script src="blog-common.js"></script>
<script>
  mermaid.initialize({ startOnLoad: false, theme: 'default' });

  async function init() {
    const params = new URLSearchParams(location.search);
    const path = params.get('path');
    const container = document.getElementById('post-detail');
    if (!path) {
      container.innerHTML = '<p class="blog-error">글 경로가 지정되지 않았습니다.</p>';
      return;
    }
    let raw;
    try {
      raw = await fetchPostRaw(path);
    } catch (e) {
      container.innerHTML = '<p class="blog-error">글을 불러올 수 없습니다: ' + path + '</p>';
      return;
    }
    const { data, body } = parseFrontmatter(raw);
    const filename = path.split('/').pop().replace(/\.md$/, '');
    const title = extractTitle(body, filename);
    const series = seriesFromPath(path);
    const tags = Array.isArray(data.tags) ? data.tags : [];
    const date = typeof data.date === 'string' ? data.date : '';

    const { text: withPlaceholders, blocks: mermaidBlocks } = extractMermaidBlocks(body);
    const transformed = transformCallouts(withPlaceholders);
    const html = renderMermaidBlocks(marked.parse(transformed), mermaidBlocks);

    container.innerHTML = `
      <div class="post-detail-header">
        <div class="post-card-meta">
          <span class="post-card-series">${seriesLabel(series)}</span>
          ${date ? `<span>${date}</span>` : ''}
        </div>
        <h1 class="post-detail-title">${title}</h1>
        ${tags.length ? `<div class="post-card-tags">${tags.map((t) => `<span class="post-tag-pill">#${t}</span>`).join('')}</div>` : ''}
      </div>
      <div class="post-body">${html}</div>
    `;

    document.querySelectorAll('.post-body pre code').forEach((block) => hljs.highlightElement(block));
    container.querySelectorAll('.post-body pre').forEach((pre) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'code-copy-btn';
      button.textContent = 'Copy';
      button.addEventListener('click', () => {
        const code = pre.querySelector('code');
        navigator.clipboard.writeText(code ? code.textContent : pre.textContent).then(() => {
          button.textContent = 'Copied!';
          setTimeout(() => { button.textContent = 'Copy'; }, 1500);
        });
      });
      pre.appendChild(button);
    });
    const mermaidNodes = container.querySelectorAll('.mermaid');
    if (mermaidNodes.length > 0) {
      await mermaid.run({ nodes: mermaidNodes });
      container.querySelectorAll('.mermaid svg').forEach((svg) => {
        const renderedHeight = svg.getBoundingClientRect().height;
        svg.style.maxWidth = 'none';
        svg.style.width = '100%';
        svg.style.height = Math.min(Math.max(renderedHeight, 240), 640) + 'px';
        svgPanZoom(svg, {
          controlIconsEnabled: true,
          fit: true,
          center: true,
          minZoom: 0.4,
          maxZoom: 10,
          zoomScaleSensitivity: 0.3
        });
      });
    }
  }

  init();
</script>
</body>
</html>
